<script>
// ── PWA bootstrap ─────────────────────────────────────────────
(function () {
  const SIZE = 512;
  const c = document.createElement('canvas');
  c.width = c.height = SIZE;
  const ctx = c.getContext('2d');
  const R = SIZE * 0.22;
  ctx.beginPath();
  ctx.moveTo(R,0);ctx.lineTo(SIZE-R,0);ctx.quadraticCurveTo(SIZE,0,SIZE,R);
  ctx.lineTo(SIZE,SIZE-R);ctx.quadraticCurveTo(SIZE,SIZE,SIZE-R,SIZE);
  ctx.lineTo(R,SIZE);ctx.quadraticCurveTo(0,SIZE,0,SIZE-R);
  ctx.lineTo(0,R);ctx.quadraticCurveTo(0,0,R,0);ctx.closePath();
  ctx.fillStyle='#0f1117';ctx.fill();
  ctx.beginPath();ctx.arc(SIZE/2,SIZE/2,SIZE*0.28,0,Math.PI*2);ctx.fillStyle='#4f8ef7';ctx.fill();
  ctx.strokeStyle='#fff';ctx.lineWidth=SIZE*0.065;ctx.lineCap='round';ctx.lineJoin='round';
  ctx.beginPath();ctx.moveTo(SIZE*0.34,SIZE*0.50);ctx.lineTo(SIZE*0.46,SIZE*0.62);ctx.lineTo(SIZE*0.66,SIZE*0.38);ctx.stroke();
  const iconDataURL = c.toDataURL('image/png');
  document.getElementById('pwa-apple-icon').href = iconDataURL;
  const manifest = {name:'Rounds',short_name:'Rounds',description:'Building rounds field app',start_url:'./',scope:'./',display:'standalone',background_color:'#0f1117',theme_color:'#4f8ef7',orientation:'portrait-primary',icons:[{src:iconDataURL,sizes:'192x192',type:'image/png',purpose:'any maskable'},{src:iconDataURL,sizes:'512x512',type:'image/png',purpose:'any maskable'}]};
  const mBlob = new Blob([JSON.stringify(manifest)],{type:'application/manifest+json'});
  document.getElementById('pwa-manifest').href = URL.createObjectURL(mBlob);
  if('serviceWorker' in navigator){
    const swSrc=`const CACHE='rounds-v3';self.addEventListener('install',evt=>{evt.waitUntil(caches.open(CACHE).then(cache=>cache.add(self.registration.scope)));self.skipWaiting();});self.addEventListener('activate',evt=>{evt.waitUntil(caches.keys().then(keys=>Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));self.clients.claim();});self.addEventListener('fetch',evt=>{if(evt.request.method!=='GET')return;evt.respondWith(fetch(evt.request).then(res=>{if(res&&res.ok){const clone=res.clone();caches.open(CACHE).then(cache=>cache.put(evt.request,clone));}return res;}).catch(()=>caches.match(evt.request)));});`;
    navigator.serviceWorker.register(URL.createObjectURL(new Blob([swSrc],{type:'application/javascript'})),{scope:'./'}).catch(()=>{});
  }
})();
</script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f1117;--surf:#1c1f2e;--surf2:#252840;--acc:#4f8ef7;--ok:#2ecc71;--warn:#f39c12;--danger:#e74c3c;--txt:#f0f2ff;--txt2:#9ba3c7;--bdr:#2e3250;--r:14px;--inp:#12141f}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;max-width:480px;margin:0 auto}
.screen{display:none;flex-direction:column;min-height:100vh}.screen.active{display:flex}
.hdr{background:var(--surf);padding:14px 18px 10px;border-bottom:1px solid var(--bdr);position:sticky;top:0;z-index:10}
.hdr h1{font-size:17px;font-weight:700}.hdr .sub{font-size:11px;color:var(--txt2);margin-top:2px}
.hdr-row{display:flex;align-items:center;justify-content:space-between}
.back{background:none;border:none;color:var(--acc);font-size:13px;cursor:pointer}
.auth-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;gap:24px}
.auth-logo{text-align:center}.auth-logo h1{font-size:26px;font-weight:800;color:var(--acc)}.auth-logo p{color:var(--txt2);font-size:13px;margin-top:6px}
.auth-card{width:100%;background:var(--surf);border-radius:var(--r);padding:24px;border:1px solid var(--bdr);display:flex;flex-direction:column;gap:14px}
.auth-card h2{font-size:16px;font-weight:700}
.auth-field{display:flex;flex-direction:column;gap:6px}
.auth-field label{font-size:12px;color:var(--txt2);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.auth-field input{padding:13px 14px;background:var(--inp);border:2px solid var(--bdr);border-radius:10px;color:var(--txt);font-size:15px;outline:none;transition:border-color .15s}
.auth-field input:focus{border-color:var(--acc)}
.auth-btn{width:100%;padding:15px;background:var(--acc);border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:700;cursor:pointer}
.auth-err{font-size:12px;color:var(--danger);text-align:center;display:none}.auth-err.show{display:block}
.logout-btn{background:none;border:none;color:var(--txt2);font-size:12px;cursor:pointer}
.rounds-content{flex:1;padding:20px 18px;display:flex;flex-direction:column;gap:12px}
.lbl{font-size:11px;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.round-card{background:var(--surf);border-radius:var(--r);padding:18px;border:1px solid var(--bdr);cursor:pointer;display:flex;align-items:center;gap:14px;transition:all .15s}
.round-card:active{border-color:var(--acc);background:rgba(79,142,247,.08)}
.round-icon{width:44px;height:44px;border-radius:12px;background:var(--surf2);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.round-info{flex:1}.round-name{font-size:15px;font-weight:700}.round-desc{font-size:12px;color:var(--txt2);margin-top:3px}
.round-arrow{color:var(--txt2);font-size:18px}
.no-rounds{text-align:center;color:var(--txt2);font-size:13px;padding:40px 20px;line-height:1.6}
.prog-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.prog-bar{flex:1;height:4px;background:var(--bdr);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--acc);border-radius:2px;transition:width .3s}
.prog-txt{font-size:11px;color:var(--txt2);white-space:nowrap}
.badge{display:inline-block;background:var(--surf2);color:var(--acc);font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:.4px}
.log-content{flex:1;padding:16px 18px;display:flex;flex-direction:column}
.log-card{background:var(--surf);border-radius:var(--r);padding:20px 18px;border:1px solid var(--bdr);flex:1;display:flex;flex-direction:column;gap:16px}
.log-name{font-size:21px;font-weight:800;line-height:1.2}
.log-desc{font-size:12px;color:var(--txt2);margin-top:3px;line-height:1.4}
.prev{background:var(--inp);border-radius:8px;padding:10px 13px;font-size:12px;color:var(--txt2);cursor:pointer;display:none}
.prev.vis{display:block}.prev strong{color:var(--txt)}
.s-grid{display:grid;gap:9px}
.s-grid.c2{grid-template-columns:1fr 1fr}.s-grid.c3{grid-template-columns:1fr 1fr 1fr}.s-grid.c4{grid-template-columns:1fr 1fr 1fr 1fr}
.s-opt{padding:17px 6px;border-radius:11px;border:2px solid var(--bdr);background:var(--inp);color:var(--txt2);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;text-align:center}
.s-opt.sel{border-color:var(--acc);background:rgba(79,142,247,.15);color:var(--txt)}
.s-opt.ok.sel{border-color:var(--ok);background:rgba(46,204,113,.12);color:var(--ok)}
.s-opt.warn.sel{border-color:var(--warn);background:rgba(243,156,18,.12);color:var(--warn)}
.s-opt.alarm.sel{border-color:var(--danger);background:rgba(231,76,60,.12);color:var(--danger)}
.num-wrap{position:relative;width:100%}
.num-inp{width:100%;background:var(--inp);border:2px solid var(--bdr);border-radius:11px;padding:18px 70px 18px 18px;font-size:30px;font-weight:700;color:var(--txt);text-align:center;outline:none;transition:border-color .15s}
.num-inp:focus{border-color:var(--acc)}
.num-unit{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:13px;font-weight:600;color:var(--txt2);pointer-events:none}
.range-ind{font-size:11px;color:var(--txt2);text-align:center}
.range-ind.ralert{color:var(--danger);font-weight:600}.range-ind.rwarn{color:var(--warn);font-weight:600}
.ack-btn{width:100%;padding:14px;background:var(--warn);border:none;border-radius:11px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;display:none}.ack-btn.show{display:block}
.action-row{display:flex;gap:10px}
.action-btn{flex:1;padding:11px;background:var(--inp);border:1px solid var(--bdr);border-radius:9px;color:var(--txt2);font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s}
.action-btn.active{border-color:var(--acc);color:var(--acc)}
.notes-box{background:var(--inp);border:1px solid var(--bdr);border-radius:9px;padding:10px;display:none;position:relative}.notes-box.open{display:block}
.notes-ta{width:100%;background:transparent;border:none;color:var(--txt);font-size:13px;resize:none;outline:none;min-height:70px;font-family:inherit;padding-right:28px}
.notes-clear{position:absolute;top:8px;right:8px;background:none;border:none;color:var(--txt2);font-size:16px;cursor:pointer}
.photo-list{display:flex;flex-wrap:wrap;gap:7px}
.photo-thumb{width:56px;height:56px;border-radius:8px;object-fit:cover;border:1px solid var(--bdr);cursor:pointer}
.log-nav{display:flex;gap:10px;padding:14px 18px;background:var(--surf);border-top:1px solid var(--bdr);align-items:center}
.nav-p{padding:14px 18px;background:var(--surf2);border:1px solid var(--bdr);border-radius:11px;color:var(--txt);font-size:15px;cursor:pointer;font-weight:600}
.nav-jump{padding:14px;background:var(--surf2);border:1px solid var(--bdr);border-radius:11px;color:var(--txt2);cursor:pointer;display:flex;align-items:center;justify-content:center}
.nav-n{flex:1;padding:14px;background:var(--acc);border:none;border-radius:11px;color:#fff;font-size:15px;font-weight:700;cursor:pointer}.nav-n.done{background:var(--ok)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:none;flex-direction:column}.overlay.open{display:flex}
.jump-panel{background:var(--surf);border-radius:var(--r) var(--r) 0 0;margin-top:auto;max-height:78vh;display:flex;flex-direction:column}
.jump-hdr{padding:14px 18px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.jump-hdr h2{font-size:15px;font-weight:700}.jump-close{background:none;border:none;color:var(--txt2);font-size:20px;cursor:pointer}
.jump-list{overflow-y:auto;flex:1;padding:6px 0}
.jump-sec{padding:8px 18px 3px;font-size:10px;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px;font-weight:700}
.jump-item{padding:13px 18px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;border-bottom:1px solid rgba(46,50,80,.4)}
.jump-item .jname{font-size:13px;font-weight:600}.jump-item .jval{font-size:11px;color:var(--txt2)}
.jump-item.logged .jval{color:var(--ok)}.jump-item.cur{background:rgba(79,142,247,.1)}.jump-item.cur .jname{color:var(--acc)}
.done-content{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;gap:22px;text-align:center}
.done-icon{font-size:60px}.done-content h2{font-size:24px;font-weight:800}
.done-content p{color:var(--txt2);font-size:14px;line-height:1.6}
.sync-st{background:var(--surf);border-radius:var(--r);padding:14px 18px;width:100%;border:1px solid var(--bdr);font-size:13px;color:var(--txt2)}
.sync-st.synced{border-color:var(--ok);color:var(--ok)}.sync-st.pend{border-color:var(--warn);color:var(--warn)}
.new-btn{width:100%;padding:16px;background:var(--surf2);border:1px solid var(--bdr);border-radius:var(--r);color:var(--txt);font-size:15px;font-weight:600;cursor:pointer}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surf2);border:1px solid var(--bdr);border-radius:50px;padding:10px 18px;font-size:12px;color:var(--txt);opacity:0;transition:all .3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#photoInput{display:none}
.loading-overlay{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.loading-overlay.gone{display:none}
.spinner{width:36px;height:36px;border:3px solid var(--bdr);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-overlay p{color:var(--txt2);font-size:13px}
</style>
</head>
<body>

<div class="loading-overlay" id="loading-overlay">
  <div class="spinner"></div>
  <p>Loading Rounds...</p>
</div>

<div id="s-login" class="screen">
  <div class="auth-wrap">
    <div class="auth-logo"><h1>Rounds</h1><p>Sign in to continue</p></div>
    <div class="auth-card">
      <h2>Sign In</h2>
      <div class="auth-field"><label>Username</label><input type="text" id="login-user" placeholder="Enter your username" autocomplete="username"></div>
      <div class="auth-field"><label>Password</label><input type="password" id="login-pass" placeholder="Enter your password" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <div class="auth-err" id="login-err">Incorrect username or password</div>
      <button class="auth-btn" onclick="doLogin()">Sign In</button>
    </div>
  </div>
</div>

<div id="s-setpw" class="screen">
  <div class="auth-wrap">
    <div class="auth-logo"><h1>Set Password</h1><p>Create your password to get started</p></div>
    <div class="auth-card">
      <h2>Create Password</h2>
      <div class="auth-field"><label>New Password</label><input type="password" id="pw1" placeholder="At least 6 characters"></div>
      <div class="auth-field"><label>Confirm Password</label><input type="password" id="pw2" placeholder="Repeat password" onkeydown="if(event.key==='Enter')doSetPw()"></div>
      <div class="auth-err" id="pw-err">Passwords don't match</div>
      <button class="auth-btn" onclick="doSetPw()">Set Password & Continue</button>
    </div>
  </div>
</div>

<div id="s-rounds" class="screen">
  <div class="hdr">
    <div class="hdr-row"><h1 id="rounds-building">Rounds</h1><button class="logout-btn" onclick="doLogout()">Sign Out</button></div>
    <div class="sub" id="rounds-user"></div>
  </div>
  <div class="rounds-content">
    <div class="lbl">Select Round Type</div>
    <div id="round-cards"></div>
  </div>
</div>

<div id="s-log" class="screen">
  <div class="hdr">
    <div class="hdr-row">
      <button class="back" onclick="goTo('rounds')">← Rounds</button>
      <span id="tmpl-badge" style="font-size:11px;color:var(--txt2)"></span>
    </div>
    <div class="prog-row" style="margin-top:8px"><div class="prog-bar"><div class="prog-fill" id="pfill" style="width:0%"></div></div><div class="prog-txt" id="ptxt">1 of 1</div></div>
    <div id="sbadge" class="badge">Section</div>
  </div>
  <div class="log-content">
    <div class="log-card">
      <div><div class="log-name" id="lname"></div><div class="log-desc" id="ldesc"></div></div>
      <div class="prev" id="prev-box" onclick="showHist()">Last: <strong id="prev-val"></strong> <span id="prev-time" style="font-size:10px"></span></div>
      <div id="inp-area"></div>
      <div class="range-ind" id="range-ind"></div>
      <button class="ack-btn" id="ack-btn" onclick="acknowledge()">⚠️ Out of Range — Tap to Acknowledge</button>
      <div class="action-row">
        <button class="action-btn" id="notes-btn" onclick="toggleNotes()">✏️ Notes</button>
        <button class="action-btn" id="photo-btn" onclick="triggerPhoto()">📷 Photo</button>
      </div>
      <div class="notes-box" id="notes-box">
        <textarea class="notes-ta" id="notes-ta" placeholder="Add notes about this reading..." oninput="saveNote()"></textarea>
        <button class="notes-clear" onclick="clearNotes()">✕</button>

      <div class="photo-list" id="photo-list"></div>

  </div>
  <div class="log-nav">
    <button class="nav-p" id="nav-p" onclick="prevLog()">←</button>
    <button class="nav-jump" onclick="openJump()">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="2" y="3" width="14" height="2" rx="1" fill="currentColor"/><rect x="2" y="8" width="14" height="2" rx="1" fill="currentColor"/><rect x="2" y="13" width="9" height="2" rx="1" fill="currentColor"/></svg>
    </button>
    <button class="nav-n" id="nav-n" onclick="nextLog()">Next</button>
  </div>
</div>

<div id="s-done" class="screen">
  <div class="hdr"><div class="hdr-row"><h1>Round Complete</h1></div></div>
  <div class="done-content">
    <div class="done-icon">✅</div>
    <h2>Round Complete</h2>
    <p id="done-sum"></p>
    <div class="sync-st" id="sync-st">Saving data...</div>
    <button class="new-btn" onclick="resetRound()">Back to Rounds Menu</button>
  </div>
</div>

<div class="overlay" id="jump-overlay" onclick="closeJumpOutside(event)">
  <div class="jump-panel">
    <div class="jump-hdr"><h2>Jump to Log</h2><button class="jump-close" onclick="closeJump()">✕</button></div>
    <div class="jump-list" id="jump-list"></div>
  </div>
</div>

<input type="file" id="photoInput" accept="image/*" capture="environment" multiple onchange="handlePhotos(event)">
<div class="toast" id="toast"></div>

<script>
// ── UTILITIES ────────────────────────────────────────────────
function hashPw(pw){let h=0;for(let i=0;i<pw.length;i++){h=((h<<5)-h)+pw.charCodeAt(i);h|=0;}return h.toString(36);}
function getUsers(){return JSON.parse(localStorage.getItem('lc_users')||'[]');}
function saveUsers(u){localStorage.setItem('lc_users',JSON.stringify(u));}
function getWebhookUrl(){return localStorage.getItem('lc_sheet_url')||'';}
function goTo(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById('s-'+id).classList.add('active');window.scrollTo(0,0);}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
function fmtTime(iso){if(!iso)return'';const d=new Date(iso);return d.toLocaleDateString('en-US',{month:'short',day:'numeric'})+' '+d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});}
function fmtDate(iso){if(!iso)return'';return new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'2-digit'});}
function getPrev(lpId,tmplId){const h=JSON.parse(localStorage.getItem('lc_history')||'[]');for(const r of h){if(r.templateId===tmplId&&r.vals&&r.vals[lpId]!==undefined)return{v:r.vals[lpId],t:r.t1};}return null;}

// ── CONFIG — fetched from Sheet on every open ────────────────
let APP_CONFIG = null;

async function loadConfig(){
  const url=getWebhookUrl();
  if(url){
    try{
      const res=await fetch(url+'?action=getConfig',{cache:'no-store'});
      const data=await res.json();
      if(data.ok&&data.config){
        APP_CONFIG=data.config;
        localStorage.setItem('lc_admin_config',JSON.stringify(data.config));
        // Sync webhook URL from config if present
        if(data.config.webhookUrl)localStorage.setItem('lc_sheet_url',data.config.webhookUrl);
        return;
      }
    }catch(e){/* offline */}
  }
  const cached=localStorage.getItem('lc_admin_config');
  if(cached){try{APP_CONFIG=JSON.parse(cached);}catch(e){APP_CONFIG=getDefaultConfig();}}
  else APP_CONFIG=getDefaultConfig();
}

function getConfig(){return APP_CONFIG||getDefaultConfig();}

// ── BOOT ─────────────────────────────────────────────────────
async function init(){
  await loadConfig();
  document.getElementById('loading-overlay').classList.add('gone');
  checkSession();
}

// ── AUTH ─────────────────────────────────────────────────────
function checkSession(){
  const users=getUsers();
  if(users.length===0){users.push({username:'Scott',email:'smorris@metroservices.com',pwHash:null,forceReset:false,isAdmin:true,assignedRounds:'all'});saveUsers(users);}
  const token=localStorage.getItem('lc_session');
  if(token){const user=users.find(u=>u.username===token);if(user){enterApp(user);return;}}
  goTo('login');
}

function doLogin(){
  const username=document.getElementById('login-user').value.trim();
  const password=document.getElementById('login-pass').value;
  const users=getUsers();const user=users.find(u=>u.username===username);
  const errEl=document.getElementById('login-err');
  if(!user){errEl.classList.add('show');return;}
  if(!user.pwHash||user.forceReset){localStorage.setItem('lc_pending_reset',username);goTo('setpw');return;}
  if(hashPw(password)!==user.pwHash){errEl.classList.add('show');return;}
  errEl.classList.remove('show');localStorage.setItem('lc_session',username);enterApp(user);
}

function doSetPw(){
  const pw1=document.getElementById('pw1').value,pw2=document.getElementById('pw2').value;
  const errEl=document.getElementById('pw-err');
  if(pw1.length<6){errEl.textContent='Password must be at least 6 characters';errEl.classList.add('show');return;}
  if(pw1!==pw2){errEl.textContent="Passwords don't match";errEl.classList.add('show');return;}
  errEl.classList.remove('show');
  const username=localStorage.getItem('lc_pending_reset');
  const users=getUsers();const user=users.find(u=>u.username===username);
  if(user){user.pwHash=hashPw(pw1);user.forceReset=false;}
  saveUsers(users);localStorage.removeItem('lc_pending_reset');
  localStorage.setItem('lc_session',username);enterApp(user);
}

function doLogout(){localStorage.removeItem('lc_session');ST.currentUser=null;goTo('login');}

function enterApp(user){
  ST.currentUser=user.username;
  const cfg=getConfig();
  document.getElementById('rounds-building').textContent=cfg.building||'Rounds';
  document.getElementById('rounds-user').textContent='Signed in as '+user.username;
  renderRoundCards(user);goTo('rounds');
}

// ── ROUND SELECTION ──────────────────────────────────────────
const ICONS=['🏢','⚡','🔥','💧','🌡️','🔧','⚙️','📊','🏭','🔌'];

function getAssignedTemplates(user){
  const cfg=getConfig();const templates=(cfg.templates||[]).filter(t=>t.active);
  if(user.isAdmin||user.assignedRounds==='all')return templates;
  return templates.filter(t=>(user.assignedRounds||[]).includes(t.id));
}

function renderRoundCards(user){
  const templates=getAssignedTemplates(user);
  const container=document.getElementById('round-cards');container.innerHTML='';
  if(!templates.length){container.innerHTML='<div class="no-rounds">No rounds assigned.<br>Contact your administrator.</div>';return;}
  templates.forEach((tmpl,i)=>{
    const card=document.createElement('div');card.className='round-card';
    card.innerHTML=`<div class="round-icon">${ICONS[i%ICONS.length]}</div><div class="round-info"><div class="round-name">${tmpl.name}</div><div class="round-desc">${tmpl.description||((tmpl.logs||[]).length+' log points')}</div></div><div class="round-arrow">→</div>`;
    card.onclick=()=>selectTemplate(tmpl);container.appendChild(card);
  });
}

function selectTemplate(tmpl){
  ST.selectedTemplate=tmpl;ST.vals={};ST.notes={};ST.photos={};ST.idx=0;ST.editMap={};ST.acknowledged={};
  ST.rid='r'+Date.now();ST.t0=new Date().toISOString();
  ST.active=buildActiveLog(tmpl,{});
  if(!ST.active.length){showToast('No log points in this round');return;}
  document.getElementById('tmpl-badge').textContent=tmpl.name;
  render();goTo('log');
}

// ── CONDITIONAL LOGIC ────────────────────────────────────────
function buildActiveLog(tmpl,vals){
  return(tmpl.logs||[]).filter(lp=>{
    if(!lp.condEnabled||!lp.condTrigger||!lp.condValue)return true;
    const v=vals[lp.condTrigger];
    if(v===undefined||v===null||v==='')return false;
    return String(v)===String(lp.condValue);
  });
}

function rebuildActiveLog(){
  const tmpl=ST.selectedTemplate;const newActive=buildActiveLog(tmpl,ST.vals);
  const curId=ST.active[ST.idx]?ST.active[ST.idx].id:null;
  ST.active=newActive;
  if(curId){const ni=newActive.findIndex(l=>l.id===curId);if(ni!==-1)ST.idx=ni;else if(ST.idx>=newActive.length)ST.idx=Math.max(0,newActive.length-1);}
}

// ── STATE ────────────────────────────────────────────────────
let ST={currentUser:null,selectedTemplate:null,active:[],idx:0,vals:{},notes:{},photos:{},rid:null,t0:null,editMap:{},acknowledged:{},_photoTarget:null};

function render(){
  const total=ST.active.length;if(!total){completeRound();return;}
  const lp=ST.active[ST.idx];
  document.getElementById('pfill').style.width=((ST.idx/total)*100)+'%';
  document.getElementById('ptxt').textContent=(ST.idx+1)+' of '+total;
  document.getElementById('sbadge').textContent=lp.sec;
  document.getElementById('lname').textContent=lp.name;
  const descEl=document.getElementById('ldesc');descEl.textContent=lp.desc||'';descEl.style.display=lp.desc?'block':'none';
  const prev=getPrev(lp.id,ST.selectedTemplate.id);
  const pb=document.getElementById('prev-box');
  if(prev){pb.classList.add('vis');document.getElementById('prev-val').textContent=prev.v;document.getElementById('prev-time').textContent='('+fmtTime(prev.t)+')';}
  else pb.classList.remove('vis');
  const ia=document.getElementById('inp-area');ia.innerHTML='';
  if(lp.type==='status'){
    const opts=lp.opts||[];const n=opts.length,cls=n<=2?'c2':n===3?'c3':'c4';
    const g=document.createElement('div');g.className='s-grid '+cls;
    opts.forEach(o=>{
      const label=typeof o==='object'?o.label:o,style=typeof o==='object'?o.style:'';
      const b=document.createElement('button');b.className='s-opt '+style;b.textContent=label;
      if(ST.vals[lp.id]===label)b.classList.add('sel');
      b.onclick=()=>{g.querySelectorAll('.s-opt').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');recordVal(lp.id,label);rebuildActiveLog();};
      g.appendChild(b);
    });ia.appendChild(g);
  }else{
    const wrap=document.createElement('div');wrap.className='num-wrap';
    const inp=document.createElement('input');inp.type='number';inp.inputMode='decimal';inp.className='num-inp';inp.placeholder='—';
    if(ST.vals[lp.id]!==undefined)inp.value=ST.vals[lp.id];
    inp.oninput=()=>{recordVal(lp.id,inp.value);checkLimits(lp,parseFloat(inp.value));};
    wrap.appendChild(inp);
    if(lp.unit){const u=document.createElement('span');u.className='num-unit';u.textContent=lp.unit;wrap.appendChild(u);}
    ia.appendChild(wrap);setTimeout(()=>inp.focus(),80);
    if(ST.vals[lp.id]!==undefined)checkLimits(lp,parseFloat(ST.vals[lp.id]));
  }
  updateLimitDisplay(lp,ST.vals[lp.id]);
  const nb=document.getElementById('notes-box'),ta=document.getElementById('notes-ta');
  const hasNote=!!(ST.notes[lp.id]&&ST.notes[lp.id].length);
  nb.className='notes-box'+(hasNote?' open':'');ta.value=ST.notes[lp.id]||'';
  document.getElementById('notes-btn').className='action-btn'+(hasNote?' active':'');
  renderPhotos(lp.id);
  document.getElementById('nav-p').style.display=ST.idx===0?'none':'block';
  const nn=document.getElementById('nav-n');
  nn.textContent=ST.idx===total-1?'End Round ✓':'Next';
  nn.className='nav-n'+(ST.idx===total-1?' done':'');
}

function pf(v){return v!==undefined&&v!==''?parseFloat(v):NaN;}

function checkLimits(lp,v){
  if(isNaN(v))return;updateLimitDisplay(lp,v);
  const aLo=pf(lp.alertLo),aHi=pf(lp.alertHi);
  if((!isNaN(aLo)&&v<aLo)||(!isNaN(aHi)&&v>aHi)){
    const al=JSON.parse(localStorage.getItem('lc_alerts')||'[]');
    if(!al.find(a=>a.id===lp.id&&a.rid===ST.rid)){
      al.push({id:lp.id,name:lp.name,sec:lp.sec,val:v,unit:lp.unit||'',alertLo:lp.alertLo,alertHi:lp.alertHi,eng:ST.currentUser,t:new Date().toISOString(),rid:ST.rid,template:ST.selectedTemplate.name});
      localStorage.setItem('lc_alerts',JSON.stringify(al));
    }
  }
}

function updateLimitDisplay(lp,v){
  const ri=document.getElementById('range-ind'),ackBtn=document.getElementById('ack-btn');
  ri.className='range-ind';ri.textContent='';ackBtn.className='ack-btn';
  const wLo=pf(lp.warnLo),wHi=pf(lp.warnHi),aLo=pf(lp.alertLo),aHi=pf(lp.alertHi);
  const hasLimits=!isNaN(wLo)||!isNaN(wHi)||!isNaN(aLo)||!isNaN(aHi);if(!hasLimits)return;
  const num=parseFloat(v);
  const loDisplay=!isNaN(wLo)?wLo:(!isNaN(aLo)?aLo:'—');
  const hiDisplay=!isNaN(wHi)?wHi:(!isNaN(aHi)?aHi:'—');
  if(isNaN(num)){ri.textContent='Normal: '+loDisplay+' – '+hiDisplay+' '+(lp.unit||'');return;}
  const alertOOR=(!isNaN(aLo)&&num<aLo)||(!isNaN(aHi)&&num>aHi);
  const warnOOR=(!isNaN(wLo)&&num<wLo)||(!isNaN(wHi)&&num>wHi);
  if(alertOOR){ri.className='range-ind ralert';ri.textContent='🚨 ALERT: Outside alert limits!';if(!ST.acknowledged[lp.id])ackBtn.className='ack-btn show';}
  else if(warnOOR){ri.className='range-ind rwarn';ri.textContent='⚠️ Warning: Outside normal range';if(!ST.acknowledged[lp.id])ackBtn.className='ack-btn show';}
  else{ri.textContent='Normal: '+loDisplay+' – '+hiDisplay+' '+(lp.unit||'');}
}

function acknowledge(){ST.acknowledged[ST.active[ST.idx].id]=true;document.getElementById('ack-btn').className='ack-btn';}
function recordVal(id,v){const wasSet=ST.vals[id]!==undefined;ST.vals[id]=v;if(wasSet)ST.editMap[id]={by:ST.currentUser,at:new Date().toISOString()};}
function toggleNotes(){const nb=document.getElementById('notes-box'),btn=document.getElementById('notes-btn');const open=nb.classList.toggle('open');btn.className='action-btn'+(open?' active':'');if(open)setTimeout(()=>document.getElementById('notes-ta').focus(),50);}
function saveNote(){if(ST.active[ST.idx])ST.notes[ST.active[ST.idx].id]=document.getElementById('notes-ta').value;}
function clearNotes(){if(!ST.active[ST.idx])return;const id=ST.active[ST.idx].id;ST.notes[id]='';document.getElementById('notes-ta').value='';document.getElementById('notes-box').className='notes-box';document.getElementById('notes-btn').className='action-btn';}
function triggerPhoto(){if(ST.active[ST.idx])ST._photoTarget=ST.active[ST.idx].id;document.getElementById('photoInput').click();}

function handlePhotos(e){
  const id=ST._photoTarget;if(!id)return;if(!ST.photos[id])ST.photos[id]=[];
  Array.from(e.target.files).slice(0,5-ST.photos[id].length).forEach(f=>{
    const r=new FileReader();
    r.onload=ev=>{ST.photos[id].push({data:ev.target.result,name:f.name,type:f.type,t:new Date().toISOString()});renderPhotos(id);};
    r.readAsDataURL(f);
  });
  e.target.value='';
}

function renderPhotos(id){
  const pl=document.getElementById('photo-list');pl.innerHTML='';
  const photos=ST.photos[id]||[];
  document.getElementById('photo-btn').className='action-btn'+(photos.length>0?' active':'');
  photos.forEach((p,i)=>{const img=document.createElement('img');img.className='photo-thumb';img.src=p.data;img.onclick=()=>{if(confirm('Remove this photo?')){ST.photos[id].splice(i,1);renderPhotos(id);}};pl.appendChild(img);});
}

function nextLog(){
  const lp=ST.active[ST.idx];const v=parseFloat(ST.vals[lp.id]);
  if(!isNaN(v)&&!ST.acknowledged[lp.id]){
    const wLo=pf(lp.warnLo),wHi=pf(lp.warnHi),aLo=pf(lp.alertLo),aHi=pf(lp.alertHi);
    if((!isNaN(aLo)&&v<aLo)||(!isNaN(aHi)&&v>aHi)||(!isNaN(wLo)&&v<wLo)||(!isNaN(wHi)&&v>wHi)){showToast('Please acknowledge the out-of-range reading first');return;}
  }
  if(ST.idx===ST.active.length-1){completeRound();return;}
  ST.idx++;render();window.scrollTo(0,0);
}

function prevLog(){if(ST.idx>0){ST.idx--;render();window.scrollTo(0,0);}}

function openJump(){
  const jl=document.getElementById('jump-list');jl.innerHTML='';let lastSec='';
  ST.active.forEach((lp,i)=>{
    if(lp.sec!==lastSec){const s=document.createElement('div');s.className='jump-sec';s.textContent=lp.sec;jl.appendChild(s);lastSec=lp.sec;}
    const item=document.createElement('div');const logged=ST.vals[lp.id]!==undefined;
    item.className='jump-item'+(logged?' logged':'')+(i===ST.idx?' cur':'');
    const dispVal=logged?String(ST.vals[lp.id])+(lp.unit?' '+lp.unit:''):'—';
    item.innerHTML='<span class="jname">'+lp.name+(lp.condEnabled?'<span style="font-size:9px;color:var(--warn);margin-left:4px">●</span>':'')+'</span><span class="jval">'+dispVal+'</span>';
    item.onclick=()=>{ST.idx=i;render();closeJump();window.scrollTo(0,0);};
    jl.appendChild(item);
  });
  document.getElementById('jump-overlay').classList.add('open');
}
function closeJump(){document.getElementById('jump-overlay').classList.remove('open');}
function closeJumpOutside(e){if(e.target===document.getElementById('jump-overlay'))closeJump();}

function showHist(){
  const lp=ST.active[ST.idx];const h=JSON.parse(localStorage.getItem('lc_history')||'[]');const tmplId=ST.selectedTemplate.id;
  const rows=h.filter(r=>r.templateId===tmplId&&r.vals&&r.vals[lp.id]!==undefined).slice(0,5)
    .map(r=>{let line=fmtDate(r.t1)+': '+r.vals[lp.id]+(lp.unit?' '+lp.unit:'');if(r.editMap&&r.editMap[lp.id])line+=' [edited by '+r.editMap[lp.id].by+']';return line;}).join('\n');
  alert('Recent — '+lp.name+':\n\n'+(rows||'No history yet'));
}

// ── COMPLETE ROUND ───────────────────────────────────────────
function completeRound(){
  const tmpl=ST.selectedTemplate;const cfg=getConfig();
  const alerts=JSON.parse(localStorage.getItem('lc_alerts')||'[]').filter(a=>a.rid===ST.rid);
  const data={rid:ST.rid,eng:ST.currentUser,t0:ST.t0,t1:new Date().toISOString(),day:new Date().toDateString(),templateId:tmpl.id,templateName:tmpl.name,sheetTab:tmpl.sheetTab||tmpl.name,building:cfg.building||'Rounds',vals:ST.vals,notes:ST.notes,photos:ST.photos,editMap:ST.editMap,alerts,synced:false};
  const h=JSON.parse(localStorage.getItem('lc_history')||'[]');h.unshift(data);localStorage.setItem('lc_history',JSON.stringify(h.slice(0,200)));
  goTo('done');
  const logged=Object.keys(ST.vals).length;
  document.getElementById('done-sum').textContent=logged+' readings by '+ST.currentUser+(alerts.length?' · '+alerts.length+' alert'+(alerts.length>1?'s':''):'');
  const ss=document.getElementById('sync-st');
  if(navigator.onLine&&getWebhookUrl())syncRound(data,ss);
  else{ss.className='sync-st pend';ss.textContent='Offline — saved locally, will sync when connected';}
}

async function syncRound(data,el){
  const WEBHOOK=getWebhookUrl();
  if(!WEBHOOK){if(el){el.className='sync-st pend';el.textContent='Webhook not configured — data saved locally';}return;}
  el.textContent='Syncing...';
  try{
    // Upload photos
    const photoLinks={};
    for(const [lpId,photos] of Object.entries(data.photos||{})){
      if(!photos||!photos.length)continue;
      const lp=ST.selectedTemplate.logs.find(l=>l.id===lpId);
      photoLinks[lpId]=[];
      for(const photo of photos){
        const base64=photo.data.split(',')[1];
        const res=await fetch(WEBHOOK,{method:'POST',body:JSON.stringify({action:'uploadPhoto',base64Data:base64,mimeType:photo.type||'image/jpeg',logPointName:lp?lp.name:lpId,engineer:data.eng,timestamp:photo.t||data.t1,building:data.building})});
        const result=await res.json();
        if(result.ok)photoLinks[lpId].push({url:result.fileUrl,label:result.shortLabel});
      }
    }
    // Upload notes as Google Docs
    const noteLinks={};
    for(const [lpId,noteText] of Object.entries(data.notes||{})){
      if(!noteText||!noteText.trim())continue;
      const lp=ST.selectedTemplate.logs.find(l=>l.id===lpId);
      const res=await fetch(WEBHOOK,{method:'POST',body:JSON.stringify({action:'createNote',logPointName:lp?lp.name:lpId,engineer:data.eng,timestamp:data.t1,building:data.building,notesText:noteText})});
      const result=await res.json();
      if(result.ok)noteLinks[lpId]={url:result.fileUrl,label:result.shortLabel};
    }
    // Build entries
    const entries=(ST.selectedTemplate.logs||[]).map(lp=>{
      const photos=photoLinks[lp.id]||[];const note=noteLinks[lp.id];
      return{name:lp.name,value:data.vals[lp.id]!==undefined?data.vals[lp.id]:'',unit:lp.unit||'',alertLo:lp.alertLo||'',alertHi:lp.alertHi||'',hasPhoto:photos.length>0,photoLink:photos.map(p=>`=HYPERLINK("${p.url}","${p.label}")`).join(', '),hasNotes:!!note,notesLink:note?`=HYPERLINK("${note.url}","${note.label}")`:'',};
    });
    // Submit round
    const roundRes=await fetch(WEBHOOK,{method:'POST',body:JSON.stringify({action:'submitRound',templateName:data.templateName,sheetTab:data.sheetTab,engineer:data.eng,timestamp:data.t1,building:data.building,entries})});
    const result=await roundRes.json();
    if(result.ok){
      if(el){el.className='sync-st synced';el.textContent='✓ Synced to Google Sheets';}
      const h=JSON.parse(localStorage.getItem('lc_history')||'[]');const rec=h.find(r=>r.rid===data.rid);if(rec)rec.synced=true;localStorage.setItem('lc_history',JSON.stringify(h));
    }else throw new Error(result.error||'Sync failed');
  }catch(err){
    if(el){el.className='sync-st pend';el.textContent='Sync failed — saved locally';}
    console.error('Sync error:',err);
  }
}

function resetRound(){
  ST.selectedTemplate=null;ST.vals={};ST.notes={};ST.photos={};ST.idx=0;
  const user=getUsers().find(u=>u.username===ST.currentUser);
  if(user)loadConfig().then(()=>enterApp(user));else goTo('rounds');
}
